{% extends 'base.html' %}
{% block title %}Delete Role - Asset Management{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white fw-semibold"><i class="bi bi-exclamation-triangle me-2"></i>Delete Role</div>
            <div class="card-body text-center py-5">
                <i class="bi bi-shield-x fs-1 text-danger d-block mb-3"></i>
                <h5>Delete Role?</h5>
                <p class="text-muted">Delete role <strong>{{ role.name }}</strong>? Users with this role will lose their permissions. This action cannot be undone.</p>
                <form method="post" class="d-flex gap-3 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
                    <a href="{% url 'role_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
